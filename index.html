<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tameria</title>
    <style>
      html,
      body,
      .container {
        margin: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        background: #050309;
      }

      @font-face {
        font-family: Kenney-Future-Narrow;
        src: url('assets/fonts/kenneys-fonts/Kenney-Future-Narrow.ttf') format('truetype');
      }

      .game-intro {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        isolation: isolate;
        overflow: hidden;
        background: #69b9df;
        transition: opacity 500ms ease, visibility 500ms ease;
      }

      .game-intro.is-leaving {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .intro-parallax,
      .intro-vignette {
        position: absolute;
        inset: 0;
      }

      .intro-parallax {
        z-index: 0;
        overflow: hidden;
        background: #69b9df;
      }

      .intro-layer {
        position: absolute;
        inset: 0 auto 0 0;
        width: 220%;
        height: 100%;
        background-repeat: repeat-x;
        background-position: left bottom;
        background-size: auto 100%;
        image-rendering: pixelated;
        will-change: transform;
        animation: intro-country-scroll linear infinite;
      }

      .layer-sky {
        z-index: 0;
        width: 100%;
        background-image: url('assets/images/intro/parallax/rural/ruralparallaxsky.png');
        background-size: cover;
        animation: none;
      }

      .layer-clouds {
        z-index: 1;
        background-image: url('assets/images/intro/parallax/rural/ruralparallaxclouds.png');
        animation-duration: 110s;
      }

      .layer-mountain-back-2 {
        z-index: 2;
        background-image: url('assets/images/intro/parallax/rural/ruralparallaxmountainback2.png');
        animation-duration: 96s;
      }

      .layer-mountain-back {
        z-index: 3;
        background-image: url('assets/images/intro/parallax/rural/ruralparallaxmountainback.png');
        animation-duration: 82s;
      }

      .layer-village {
        z-index: 5;
        background-image: url('assets/images/intro/parallax/rural/ruralparallaxvillage.png');
        animation-duration: 42s;
      }

      .layer-river-reflex {
        z-index: 30;
        background-image: url('assets/images/intro/parallax/rural/ruralparallaxriverskyredlex.png');
        animation-duration: 36s;
      }

      .layer-river {
        z-index: 31;
        background-image: url('assets/images/intro/parallax/rural/ruralparallaxriver.png');
        animation-duration: 31s;
      }

      .layer-river-front {
        z-index: 32;
        background-image: url('assets/images/intro/parallax/rural/ruralparallaxriverfront.png');
        animation-duration: 24s;
      }

      @keyframes intro-country-scroll {
        from { transform: translate3d(0, 0, 0); }
        to { transform: translate3d(-50%, 0, 0); }
      }

      .intro-vignette {
        z-index: 40;
        pointer-events: none;
        background:
          radial-gradient(circle at 50% 44%, transparent 35%, rgba(0, 0, 0, 0.18) 68%, rgba(0, 0, 0, 0.64) 100%),
          linear-gradient(180deg, rgba(5, 3, 8, 0.02), rgba(5, 3, 8, 0.36));
      }

      .intro-actions {
        position: relative;
        z-index: 50;
        display: grid;
        justify-items: center;
        gap: 12px;
      }

      .intro-button {
        padding: 11px 28px;
        border: 1px solid rgba(230, 180, 80, 0.52);
        border-radius: 999px;
        background: rgba(5, 3, 8, 0.56);
        color: #e6b450;
        font-family: Kenney-Future-Narrow, Georgia, serif;
        font-size: clamp(20px, 2vw, 28px);
        letter-spacing: 0.18em;
        text-indent: 0.18em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 0 20px rgba(230, 180, 80, 0.2), 0 10px 22px rgba(0, 0, 0, 0.52);
        animation: intro-play-fade 1.25s ease-out 600ms both;
        transition: color 180ms ease, border-color 180ms ease, background 180ms ease, transform 180ms ease;
      }

      .intro-button:hover,
      .intro-button:focus-visible {
        color: #fff5d6;
        border-color: #e6b450;
        background: rgba(168, 85, 247, 0.18);
        transform: scale(1.025);
        outline: none;
      }

      .intro-button:disabled {
        cursor: wait;
        opacity: 0.75;
      }

      @keyframes intro-play-fade {
        from { opacity: 0; transform: translateY(6%) scale(0.92); filter: blur(7px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }

      .profile-hub {
        position: absolute;
        inset: 0;
        z-index: 50;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
        box-sizing: border-box;
        overflow-y: auto;
        padding: 34px 20px 96px;
      }

      .profile-creator {
        position: relative;
        z-index: 50;
        display: grid;
        grid-template-columns: minmax(260px, 0.8fr) minmax(360px, 1.2fr);
        width: min(900px, calc(100vw - 40px));
        min-height: 600px;
        overflow: hidden;
        border: 1px solid rgba(199, 255, 0, 0.36);
        border-radius: 18px;
        background: rgba(5, 10, 8, 0.91);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.66), 0 0 45px rgba(199, 255, 0, 0.1);
        backdrop-filter: blur(12px);
        opacity: 0;
        transform: translateY(18px) scale(0.98);
        transition: opacity 420ms ease, transform 420ms ease;
      }

      .profile-creator.is-visible {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .profile-avatar-panel {
        position: relative;
        display: grid;
        place-items: center;
        align-content: center;
        gap: 18px;
        min-height: 600px;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(199, 255, 0, 0.05), rgba(5, 10, 8, 0.2)),
          repeating-linear-gradient(135deg, transparent 0 11px, rgba(199, 255, 0, 0.025) 11px 12px);
        border-right: 1px solid rgba(199, 255, 0, 0.2);
      }

      .profile-avatar-panel::before {
        content: '';
        position: absolute;
        width: 280px;
        height: 280px;
        border: 1px solid rgba(199, 255, 0, 0.18);
        border-radius: 50%;
        box-shadow: inset 0 0 50px rgba(199, 255, 0, 0.07), 0 0 60px rgba(199, 255, 0, 0.06);
      }

      .profile-avatar-stage {
        position: relative;
        width: 210px;
        height: 280px;
        display: grid;
        place-items: center;
      }

      .profile-avatar {
        position: relative;
        z-index: 2;
        width: 64px;
        height: 88px;
        background-image: url('assets/images/tameria/flap-hoodie-player.png');
        background-repeat: no-repeat;
        background-position: 0 -176px;
        image-rendering: pixelated;
        transform: scale(2.75);
        animation: profile-player-idle 900ms steps(1) infinite;
      }

      .profile-avatar-shadow {
        position: absolute;
        left: 50%;
        bottom: 16px;
        width: 150px;
        height: 30px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.48);
        filter: blur(5px);
        transform: translateX(-50%);
      }

      @keyframes profile-player-idle {
        0%, 100% { background-position: 0 -176px; }
        25%, 75% { background-position: -64px -176px; }
        50% { background-position: -128px -176px; }
      }

      .profile-avatar-name {
        position: relative;
        z-index: 2;
        max-width: 260px;
        overflow: hidden;
        color: #f8fafc;
        font: 700 21px/1 Kenney-Future-Narrow, monospace;
        letter-spacing: 0.09em;
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .profile-chain-badge {
        position: relative;
        z-index: 2;
        padding: 6px 10px;
        border: 1px solid rgba(199, 255, 0, 0.34);
        border-radius: 999px;
        color: #c7ff00;
        background: rgba(199, 255, 0, 0.07);
        font: 700 10px monospace;
        letter-spacing: 0.16em;
      }

      .profile-form-panel {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 52px 58px;
        color: #f8fafc;
      }

      .profile-eyebrow {
        color: #c7ff00;
        font: 700 11px monospace;
        letter-spacing: 0.2em;
      }

      .profile-form-panel h1 {
        margin: 12px 0 10px;
        font: 700 clamp(34px, 5vw, 54px)/0.92 Kenney-Future-Narrow, monospace;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .profile-copy {
        max-width: 500px;
        margin: 0 0 28px;
        color: #aebbb5;
        font: 13px/1.55 monospace;
      }

      .profile-label {
        margin-bottom: 8px;
        color: #d9e4de;
        font: 700 11px monospace;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .profile-input {
        box-sizing: border-box;
        width: 100%;
        padding: 14px 16px;
        border: 1px solid rgba(199, 255, 0, 0.32);
        border-radius: 8px;
        outline: none;
        background: rgba(1, 5, 3, 0.74);
        color: #f8fafc;
        font: 700 18px Kenney-Future-Narrow, monospace;
        letter-spacing: 0.04em;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .profile-input:focus {
        border-color: #c7ff00;
        box-shadow: 0 0 0 3px rgba(199, 255, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.03);
      }

      .profile-input:disabled { opacity: 0.7; }

      .profile-hint,
      .profile-wallet-note {
        margin: 8px 0 18px;
        color: #718079;
        font: 10px/1.4 monospace;
      }

      .profile-primary,
      .profile-wallet-button {
        width: 100%;
        padding: 13px 18px;
        border: 1px solid #c7ff00;
        border-radius: 8px;
        background: #c7ff00;
        color: #071008;
        font: 900 15px Kenney-Future-Narrow, monospace;
        letter-spacing: 0.12em;
        text-indent: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.32), 0 0 24px rgba(199, 255, 0, 0.12);
      }

      .profile-primary:hover,
      .profile-wallet-button:hover { filter: brightness(1.08); }

      .profile-wallet-button:disabled { cursor: wait; opacity: 0.7; }

      .profile-wallet-button {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background: rgba(199, 255, 0, 0.08);
        color: #c7ff00;
      }

      .profile-wallet-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #c7ff00;
        box-shadow: 0 0 12px #c7ff00;
      }

      .profile-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 22px 0 16px;
        color: #718079;
        font: 700 9px monospace;
        letter-spacing: 0.16em;
      }

      .profile-divider::before,
      .profile-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(199, 255, 0, 0.15);
      }

      .profile-wallet-note { margin: 8px 0 0; text-align: center; }

      .profile-status {
        min-height: 18px;
        margin-top: 14px;
        color: #aebbb5;
        font: 11px/1.4 monospace;
        text-align: center;
      }

      .profile-status[data-state='error'] { color: #fb7185; }
      .profile-status[data-state='success'] { color: #c7ff00; }

      .profile-primary:disabled,
      .profile-character-play:disabled { cursor: not-allowed; opacity: 0.45; }

      .profile-wallet-button.is-connected {
        border-color: rgba(199, 255, 0, 0.55);
        background: rgba(199, 255, 0, 0.14);
      }

      .profile-character-library {
        position: relative;
        z-index: 50;
        box-sizing: border-box;
        width: min(900px, calc(100vw - 40px));
        padding: 24px 28px;
        border: 1px solid rgba(199, 255, 0, 0.25);
        border-radius: 16px;
        background: rgba(5, 10, 8, 0.91);
        color: #f8fafc;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.52);
        backdrop-filter: blur(12px);
      }

      .profile-character-library h2 {
        margin: 7px 0 20px;
        font: 700 30px/1 Kenney-Future-Narrow, monospace;
        letter-spacing: 0.03em;
        text-transform: uppercase;
      }

      .profile-character-list { display: grid; gap: 10px; }

      .profile-library-empty {
        margin: 0;
        padding: 20px;
        border: 1px dashed rgba(199, 255, 0, 0.22);
        border-radius: 10px;
        color: #85928c;
        font: 12px/1.5 monospace;
        text-align: center;
      }

      .profile-character-card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 12px 14px;
        border: 1px solid rgba(199, 255, 0, 0.16);
        border-radius: 10px;
        background: rgba(199, 255, 0, 0.035);
      }

      .profile-character-identity {
        display: flex;
        align-items: center;
        min-width: 0;
        gap: 16px;
      }

      .profile-character-portrait {
        flex: 0 0 auto;
        width: 32px;
        height: 44px;
        background: url('assets/images/tameria/flap-hoodie-player.png') 0 -88px / 96px 176px no-repeat;
        image-rendering: pixelated;
      }

      .profile-character-card h3 {
        overflow: hidden;
        margin: 0 0 5px;
        color: #f8fafc;
        font: 700 18px/1 Kenney-Future-Narrow, monospace;
        letter-spacing: 0.05em;
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .profile-character-card p {
        margin: 0;
        color: #718079;
        font: 10px/1.3 monospace;
      }

      .profile-character-play {
        flex: 0 0 auto;
        min-width: 104px;
        padding: 10px 16px;
        border: 1px solid #c7ff00;
        border-radius: 7px;
        color: #071008;
        background: #c7ff00;
        font: 900 13px Kenney-Future-Narrow, monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
      }

      .twitter-link {
        position: fixed;
        right: 18px;
        bottom: 18px;
        z-index: 10000;
        display: grid;
        width: 48px;
        height: 48px;
        place-items: center;
        border: 1px solid rgba(255, 255, 255, 0.38);
        border-radius: 50%;
        color: #fff;
        background: rgba(5, 10, 8, 0.84);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.45);
        text-decoration: none;
        backdrop-filter: blur(8px);
        transition: transform 160ms ease, border-color 160ms ease, color 160ms ease;
      }

      .twitter-link:hover,
      .twitter-link:focus-visible {
        color: #c7ff00;
        border-color: #c7ff00;
        transform: translateY(-2px);
        outline: none;
      }

      .twitter-link svg { width: 21px; height: 21px; fill: currentColor; }

      @media (max-width: 720px) {
        .profile-creator {
          grid-template-columns: 1fr;
          min-height: 0;
          max-height: none;
          overflow: hidden;
        }
        .profile-hub { padding: 14px 12px 86px; }
        .profile-character-library { width: calc(100vw - 24px); padding: 20px 16px; }
        .profile-character-card { align-items: stretch; flex-direction: column; }
        .profile-character-play { width: 100%; }
        .profile-avatar-panel {
          min-height: 240px;
          border-right: 0;
          border-bottom: 1px solid rgba(199, 255, 0, 0.2);
        }
        .profile-avatar-stage { height: 160px; }
        .profile-avatar { transform: scale(1.75); }
        .profile-avatar-shadow { bottom: 6px; width: 100px; }
        .profile-form-panel { padding: 32px 26px; }
      }

      @media (prefers-reduced-motion: reduce) {
        .intro-layer,
        .intro-button {
          animation: none;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/webfontloader@1.6.28/webfontloader.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  </head>
  <body>
    <div class="container" id="game-container"></div>

    <main class="game-intro" id="game-intro" aria-label="Tameria intro">
      <div class="intro-parallax" aria-hidden="true">
        <div class="intro-layer layer-sky"></div>
        <div class="intro-layer layer-clouds"></div>
        <div class="intro-layer layer-mountain-back-2"></div>
        <div class="intro-layer layer-mountain-back"></div>
        <div class="intro-layer layer-village"></div>
        <div class="intro-layer layer-river-reflex"></div>
        <div class="intro-layer layer-river"></div>
        <div class="intro-layer layer-river-front"></div>
      </div>
      <div class="intro-vignette" aria-hidden="true"></div>
      <div class="intro-actions">
        <button class="intro-button" id="intro-play" type="button">Play</button>
        <button class="intro-button" id="spectator-mode" type="button">Spectator Mode</button>
      </div>
    </main>

    <a class="twitter-link" id="twitter-link" href="https://x.com/" target="_blank" rel="noopener noreferrer" aria-label="Tameria on X / Twitter">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24h-6.657l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231 5.45-6.231Zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77Z"/></svg>
    </a>

    <script type="module">
      const intro = document.getElementById('game-intro');
      const playButton = document.getElementById('intro-play');
      const spectatorButton = document.getElementById('spectator-mode');
      const twitterLink = document.getElementById('twitter-link');
      const introButtons = [playButton, spectatorButton];

      fetch('/api/config')
        .then((response) => response.ok ? response.json() : null)
        .then((config) => {
          if (config?.twitterUrl) twitterLink.href = config.twitterUrl;
        })
        .catch(() => {});

      const setIntroButtonsDisabled = (disabled) => {
        introButtons.forEach((button) => {
          button.disabled = disabled;
        });
      };

      const launchGame = async (mode, session = null) => {
        window.__TAMERIA_SPECTATOR_MODE__ = mode === 'spectator';
        window.__TAMERIA_SESSION__ = session;
        await import('./src/main.js?v=characters-v1');
        intro.classList.add('is-leaving');
        window.setTimeout(() => {
          intro.remove();
          document.querySelector('#game-container canvas')?.focus();
        }, 500);
      };

      const openProfileCreator = async () => {
        if (introButtons.some((button) => button.disabled)) return;
        setIntroButtonsDisabled(true);
        playButton.textContent = 'Loading';
        try {
          const { showProfileScreen } = await import('./src/profile/profile-screen.js?v=characters-v1');
          showProfileScreen({
            root: intro,
            onAuthenticated: (session) => launchGame('play', session),
          });
        } catch (error) {
          console.error('Unable to open profile creation', error);
          setIntroButtonsDisabled(false);
          playButton.textContent = 'Play';
        }
      };

      const openSpectatorMode = async () => {
        if (introButtons.some((button) => button.disabled)) return;
        setIntroButtonsDisabled(true);
        spectatorButton.textContent = 'Loading';
        try {
          await launchGame('spectator');
        } catch (error) {
          console.error('Unable to start Tameria', error);
          setIntroButtonsDisabled(false);
          spectatorButton.textContent = 'Spectator Mode';
        }
      };

      playButton.addEventListener('click', openProfileCreator);
      spectatorButton.addEventListener('click', openSpectatorMode);
    </script>
  </body>
</html>
